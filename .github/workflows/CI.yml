name: CI

on:
  pull_request:
    branches: [main, jim-dev]
  push:
    branches: [main, jim-dev]
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --group test
      - name: Install flowMC from GW-JAX-Team (flowMC-dev)
        if: github.ref == 'refs/heads/jim-dev' || github.base_ref == 'jim-dev'
        run: uv pip install git+https://github.com/GW-JAX-Team/flowMC.git@flowMC-dev
      - name: Install flowMC from GW-JAX-Team (main)
        if: (github.ref == 'refs/heads/main' || github.base_ref == 'main') && github.event_name != 'release'
        run: uv pip install git+https://github.com/GW-JAX-Team/flowMC.git@main
      - name: Run tests
        run: uv run --no-sync pytest --cov=jimgw --cov-report=term-missing tests/unit --ignore=tests/integration --ignore=tests/cross_validation
      - name: Upload coverage to Coveralls
        if: matrix.python-version == '3.12'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: uv run --no-sync coveralls

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --python 3.12 --group test
      - name: Install flowMC from GW-JAX-Team (flowMC-dev)
        if: github.ref == 'refs/heads/jim-dev' || github.base_ref == 'jim-dev'
        run: uv pip install git+https://github.com/GW-JAX-Team/flowMC.git@flowMC-dev
      - name: Install flowMC from GW-JAX-Team (main)
        if: (github.ref == 'refs/heads/main' || github.base_ref == 'main') && github.event_name != 'release'
        run: uv pip install git+https://github.com/GW-JAX-Team/flowMC.git@main
      - name: Run pre-commit (excluding pyright)
        run: SKIP=pyright uv run --no-sync pre-commit run --all-files
      - name: Run pyright
        run: uv run --no-sync pyright src/

  publish:
    needs: [test, pre-commit]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/jimgw/
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
